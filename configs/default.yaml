# Конфигурация проекта SmartTherm-помощник

# Пути к данным
data_dir: "data"
models_dir: "data/models"

# RAG настройки
rag:
  embedding_model: "nomic-embed-text"
  chunks_file: "data/processed/chat/chunks_rag_extended.jsonl"
  chunk_size: 512
  chunk_overlap: 50
  top_k: 10
  reranker_model: "BAAI/bge-reranker-base"

# LLM настройки
llm:
  provider: "ollama"
  model: "qwen3.5:9b"  # Название модели в Ollama ("llama3.1:8b", "qwen3.5:9b")
  base_url: "http://localhost:11434"  # Для Docker override см. configs/docker.yaml
  think: false  # null - не передавать параметр think; true/false - передавать явно

  temperature: 0.1 # Для детерминированных ответов (RAG, чанки)
  max_tokens: 2048
  context_size: 8192 # Не передается
 
# Параметры обработки чата
chat_processing:
  # Размер группы и перекрытие для создания чанков
  group_size: 50
  overlap_size: 0
  
  # Фильтрация
  stop_words:
    - "спасибо"
    - "ок"
    - "понял"
    - "благодарю"
    - "+"
    - "да"
    - "спс"
    - "круто"
    - "супер"
    - "хорошо"

# Truncate настройки
truncate:
  limit: 50  # Количество последних сообщений для сохранения

# Bot настройки
bot:
  token: ""  # Секрет хранится только в env: TELEGRAM_BOT_TOKEN
  admin_ids: []
  use_rag: true
  streaming:
    enabled: true
    private_native_drafts: true
    flush_interval_ms: 1200
    min_chars_delta: 240
    max_draft_chars: 4000
    max_draft_seconds: 30

# Persistent memory
memory:
  sqlite_path: "data/runtime/chat_memory.sqlite3"
  session_cache_limit: 12
  registry_max_contexts: 1000
  registry_idle_ttl_seconds: 3600

# Server настройки
server:
  host: "0.0.0.0"
  port: 8000
  debug: false
