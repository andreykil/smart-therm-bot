# Конфигурация проекта SmartTherm-помощник

# Пути к данным
data_dir: "data"
models_dir: "data/models"

# RAG настройки
rag:
  embedding_model: "BAAI/bge-m3"
  chunk_size: 512
  chunk_overlap: 50
  top_k: 5
  reranker_model: "BAAI/bge-reranker-base"

# LLM настройки
llm:
  provider: "local"  # local, ollama, vllm
  model: "llama-3.1-8b-instruct"
  quantization: "Q5_K_M"  # Q4_K_M, Q5_K_M, Q6_K, Q8_0
  temperature: 0.7
  max_tokens: 512
  context_size: 8192

# Bot настройки
bot:
  token: ""  # TELEGRAM_BOT_TOKEN из .env
  admin_ids: []

# Server настройки
server:
  host: "0.0.0.0"
  port: 8000
  debug: false

# LoRA настройки
lora:
  r: 8
  alpha: 16
  epochs: 3
  batch_size: 4
  learning_rate: 0.0001
