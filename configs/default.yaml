# Конфигурация проекта SmartTherm-помощник

# Пути к данным
data_dir: "data"
models_dir: "data/models"

# RAG настройки
rag:
  embedding_model: "nomic-embed-text"
  chunk_size: 512
  chunk_overlap: 50
  top_k: 10
  reranker_model: "BAAI/bge-reranker-base"

# LLM настройки
llm:
  provider: "ollama"
  model: "qwen3.5:9b"  # Название модели в Ollama ("llama3.1:8b", "qwen3.5:9b")
  base_url: "http://localhost:11434"  # URL Ollama сервера
  think: false  # null - не передавать параметр think; true/false - передавать явно

  temperature: 0.1 # Для детерминированных ответов (RAG, чанки)
  max_tokens: 1024
  context_size: 8192 # Не передается
 
# Параметры обработки чата
chat_processing:
  # Размер группы и перекрытие для создания чанков
  group_size: 50
  overlap_size: 0
  
  # Фильтрация
  stop_words:
    - "спасибо"
    - "ок"
    - "понял"
    - "благодарю"
    - "+"
    - "да"
    - "спс"
    - "круто"
    - "супер"
    - "хорошо"

# Truncate настройки
truncate:
  limit: 50  # Количество последних сообщений для сохранения

# Bot настройки
bot:
  token: ""  # TELEGRAM_BOT_TOKEN из .env
  admin_ids: []
  use_rag: true

# Persistent memory
memory:
  sqlite_path: "data/runtime/chat_memory.sqlite3"
  session_cache_limit: 12
  registry_max_contexts: 1000
  registry_idle_ttl_seconds: 3600

# Server настройки
server:
  host: "0.0.0.0"
  port: 8000
  debug: false

# LoRA настройки
lora:
  r: 8
  alpha: 16
  epochs: 3
  batch_size: 4
  learning_rate: 0.0001
