# Централизованные промпты проекта SmartTherm Bot

# Промпт для создания RAG чанков из групп сообщений
# Используется в src/data_processing/chat_chunks.py
chunk_creation: |
  <|start_header_id|>system<|end_header_id|>

  Cоздай один RAG чанк из сообщений чата SmartTherm для технического помощника.
  Твоя задача — создать одну выжимку фактической информации о системе.

  НАБОР СООБЩЕНИЙ:

  {messages_text}

  ЗАДАЧА:
  1. Прочитай ВСЕ сообщения
  2. Выдели темы обсуждения, где есть подробная полезная фактическая информация.
  3. Cоздай ОДИН чанк для RAG строгой структуры c полезными фактами, ПОЛНОСТЬЮ соответствующий требованиям.

  ТРЕБОВАНИЯ К content.text:
  1. ГЛАВНОЕ: собери все полезные факты об обсуждаемой теме
  2. НЕ ВЫДУМЫВАЙ, пиши минимально перефразированную информацию из сообщения пользователя.
  3. КОНКРЕТНО И ПОНЯТНО: ВСЕ факты, версии, пины, команды, термины с понятным контекстом(не термин ради термина)
  5. ОБЪЁМ: 100-300 слов

  ТРЕБОВАНИЯ К metadata:
  1. tags: 3-10 тегов из списка:
     opentherm, wifi, прошивка, датчики, ds18b20, esp8266, esp32,
     navien, baxi, immergas, котёл, pid, homeassistant, mqtt,
     подключение, ошибка, диагностика, распиновка, веб-интерфейс
  2. version: укажи если упомянута (например "0.73")
  3. confidence: 0.0-1.0 (полезность обсуждения)
     - 0.9-1.0: Много полезной фактической информации, технических деталей
     - 0.7-0.9: Всё описано достаточно подробно, есть полезный опыт
     - 0.5-0.7: Есть немного полезных факты
     - <0.5: почти бесполезная информация

  КРИТИЧЕСКИ ВАЖНО:
  - ВЫВОДИ ТОЛЬКО JSON, никаких пояснений!
  - ПИШИ ТОЛЬКО ФАКТЫ, НИКОГДА НЕ ПИШИ "пользователь спросил ...", НЕ ПИШИ "В сообщении указано ...", НЕ ПИШИ "В тексте обсуждается ..."
  - НИКОГДА не пропускай написанные пользователем факты, помещай их в итоговый чанк
  - СДЕЛАЙ РОВНО 1 чанк.
  - НЕ ДЕЛАЙ неинформативный чанк: если тем много, объедини полезные факты в один содержательный чанк.

  ВЫВЕДИ JSON СТРОГОЙ СТРУКТУРЫ:
  {{
    "content": {{
      "text": "...",
      "code": ""
    }},
    "metadata": {{
      "source": "telegram chat",
      "date": "{date}",
      "tags": ["...", "..."],
      "version": "...",
      "confidence": ...
    }}
  }}

  <|eot_id|><|start_header_id|>assistant<|end_header_id|>

# Базовый системный промпт чата
chat_system_base: |
  Ты — полезный ассистент SmartTherm.
  Отвечай на вопросы по контроллерам SmartTherm, OpenTherm, ESP8266/ESP32.
  Отвечай подробно, технически грамотно, на русском языке.

# Политика ответа в режиме без RAG
chat_without_rag_policy: |
  Используй свои общие технические знания и объясняй шаги последовательно.
  Если есть неопределённость, явно обозначай допущения.

# Политика ответа в режиме с RAG
chat_with_rag_policy: |
  Приоритетно опирайся на предоставленный контекст из базы знаний.
  Если контекст неполный, дополняй из общих знаний и явно отмечай, где информация из контекста,
  а где — из предположений/общей практики. 
  КРИТИЧЕСКИ ВАЖНО: 
  Пиши ТОЛЬКО по теме вопроса/сообщения пользователя. 
  НЕ ПИШИ факты из базы знаний, если сообщение пользователя с ними не связано.
  НЕ ПРЕДЛАГАЙ варианты решения/продолжения диалога, если они не связаны напрямую с вопросом пользователя.

# User-блок для режима без RAG
chat_user_plain: |
  ВОПРОС ПОЛЬЗОВАТЕЛЯ:
  {user_question}

# User-блок для режима с RAG
chat_user_with_context: |
  ВОПРОС ПОЛЬЗОВАТЕЛЯ:
  {user_question}

  КОНТЕКСТ ИЗ БАЗЫ ЗНАНИЙ:
  {rag_context}
